<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Server - Update</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/register">Register</a>
    <a href="/update" class="active">Update</a>
  </nav>

  <div class="container">
    <h1 class="giant-title">PATCH<br>RECORD</h1>
    <div class="terminal-card">
      <form class="cyber-form" id="update-form">
        <div class="form-group">
          <label for="rollNo">Target ID [ROLL NO]</label>
          <input type="number" id="rollNo" name="rollNo" required placeholder="Enter roll number...">
        </div>
        <div class="form-group">
           <label for="field">Data Vector [FIELD]</label>
           <select id="field" name="field" required>
               <option value="" disabled selected>Select parameter...</option>
               <option value="name">Name</option>
               <option value="branch">Branch</option>
               <option value="course">Course</option>
           </select>
        </div>
        <div class="form-group">
           <label for="value">New Value</label>
           <input type="text" id="value" name="value" required placeholder="Enter updated data...">
        </div>
        <button type="submit" class="cyber-btn">Inject Patch</button>
      </form>
      <div id="result" class="result"></div>
    </div>
  </div>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="/3d-bg.js"></script>
  <script>
    document.getElementById('update-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.textContent = 'TRANSMITTING...';
      
      try {
        const response = await fetch('/update', {
          method: 'PUT',
          body: new URLSearchParams(new FormData(e.target)),
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
        });
        
        const text = await response.text();
        const resDiv = document.getElementById('result');
        if (response.status === 200) {
           resDiv.className = 'result success';
           resDiv.innerHTML = `[STATUS 200] ${text}`;
           e.target.reset();
        } else {
           resDiv.className = 'result error';
           resDiv.innerHTML = `ERROR: ${text}`;
        }
      } catch (err) {
        document.getElementById('result').className = 'result error';
        document.getElementById('result').innerHTML = `SYSTEM FAILURE: ${err.message}`;
      } finally {
        btn.textContent = 'Inject Patch';
      }
    });
  </script>
</body>
</html>
